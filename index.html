<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Welcome to try CCTP prototype</h2>
    <div id="status">Loading...</div>
    
    <video id="video" autoplay playsinline></video>
    
    <div class="controls">
        <button id="capture" disabled>please wait...</button>
        <button id="restart">Restart</button>
        <button id="download" style="display:none; background: #28a745;">💾 Download</button>
    </div>

    <div class="preview-group" id="previews"></div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script async src="https://docs.opencv.org/4.5.5/opencv.js" type="text/javascript"></script>
    <script src="script.js"></script>
</body>
</html>
